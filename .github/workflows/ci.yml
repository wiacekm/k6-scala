name: CI

on:
  pull_request:
  push:
    tags-ignore:
      - v*

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scalaversion: ["2.12.10", "2.13.16", "3.3.6", "3.5.0"]
    steps:

      - uses: actions/checkout@v4

      - name: Setup Scala
        uses: japgolly/setup-everything-scala@v3.1

      - name: Build and test
        run: sbt -DCI=1 "++${{ matrix.scalaversion }}" test package

      - name: Validate formatting
        run: sbt -DCI=1 "++${{ matrix.scalaversion }}" scalafmtCheck
